name: Build and Push to ECR
on:
  push:
    branches: ['main','dev']
    
permissions:
  id-token: write
  contents: read

jobs:
  build-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Build Docker image
        run: docker build -t ${{ secrets.ECR_REPO }}/petclinic-dev-repo:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.ECR_REPO }}/petclinic-dev-repo:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Push image to ECR
        run: |
          docker push ${{ secrets.ECR_REPO }}/petclinic-dev-repo:latest
  Deploy_to_ecs:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to ecs
              run: echo "Deploy to ecs"
     
              